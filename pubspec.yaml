name: wird_book
description: "Wird Book"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  flutter_svg: ^2.2.2
  lottie: ^3.3.2
  flutter_gen: ^5.12.0
  cached_network_image: ^3.4.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  video_player: ^2.10.0
  chewie: ^1.13.0
  fluttertoast: ^9.0.0
  url_launcher: ^6.3.2
  dio: ^5.9.0
  share_plus: ^12.0.1
  image_picker: ^1.2.0
  flutter_local_notifications: ^19.5.0
  retrofit: ^4.9.2
  path_provider: ^2.1.5
  file_picker: ^10.3.3
  image: ^4.5.4
  intl: ^0.20.2
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.4.0
  visibility_detector: ^0.4.0+2
  permission_handler: ^12.0.1
  cached_network_image_platform_interface: ^4.1.1
  flutter_localizations:
    sdk: flutter
  dotted_border: ^3.1.0
  intl_phone_field: ^3.2.0
  geolocator: ^13.0.2
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  riverpod_generator: ^3.0.3
  retrofit_generator: ^10.2.1
  riverpod_lint: ^3.0.3
  freezed: ^3.2.3
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/audios/
    - assets/database/
    - assets/database/adhkar/
    - assets/database/Books/
    - assets/fonts/
    - assets/fonts/fonts_specific/
    - assets/fonts/madina/
    - assets/images/
    - assets/images/about_shaiyk/
    - assets/images/adhkar/
    - assets/images/app_icons/
    - assets/images/borders/
    - assets/images/dashboard_icons/
    - assets/images/madina/
    - assets/images/Prayer_icons/
    - assets/images/settings_icons/
    - assets/images/shaiyk_images/
    - assets/images/surah/
    - .env

  fonts:
    - family: AlJazeeraArabic
      fonts:
        - asset: assets/fonts/Al-Jazeera-Arabic Regular.ttf
          weight: 400
        - asset: assets/fonts/Al-Jazeera-Arabic Bold.ttf
          weight: 700
        - asset: assets/fonts/fonts_specific/Al-Jazeera-Arabic-Regular.ttf
          weight: 400

    - family: Almushaf
      fonts:
        - asset: assets/fonts/almushaf.ttf

    - family: ArabSQ
      fonts:
        - asset: assets/fonts/ARABSQ.TTF

    - family: DroidNaskh
      fonts:
        - asset: assets/fonts/DroidNaskh-Regular.ttf
          weight: 400

    - family: MuhammadiQuranicFont
      fonts:
        - asset: assets/fonts/MUHAMMADI QURANIC FONT.ttf

    - family: Noor
      fonts:
        - asset: assets/fonts/noor-regular.ttf
          weight: 400

    - family: PageD
      fonts:
        - asset: assets/fonts/PageD1.TTf
        - asset: assets/fonts/PageD2.TTf

    - family: PageQ
      fonts:
        - asset: assets/fonts/PageQ1.TTf
        - asset: assets/fonts/PageQ2.TTf
        - asset: assets/fonts/PageQ3.TTf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400

    - family: RustamQuran
      fonts:
        - asset: assets/fonts/rustam_quranR3HOQ.ttf

    - family: SakkalMajalla
      fonts:
        - asset: assets/fonts/Sakkal Majalla Regular.ttf
          weight: 400

    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V20.ttf

    - family: AlQalamQuranMajeed
      fonts:
        - asset: assets/fonts/fonts_specific/Al Qalam Quran Majeed Web2_D.otf

    - family: AlQuranIndoPak
      fonts:
        - asset: assets/fonts/fonts_specific/AlQuran-IndoPak-by-QuranWBW.v.4.2.2-WL.ttf

    - family: ArialRoundedMT
      fonts:
        - asset: assets/fonts/fonts_specific/Arial Rounded MT Regular.ttf
          weight: 400

    - family: Hafs
      fonts:
        - asset: assets/fonts/fonts_specific/Hafs.ttf

    - family: KfgqpcHafsUthmanicScript
      fonts:
        - asset: assets/fonts/fonts_specific/KfgqpcHafsUthmanicScriptRegular-1jGEe.ttf
          weight: 400

    - family: Kitab
      fonts:
        - asset: assets/fonts/fonts_specific/Kitab-Regular.ttf
          weight: 400

    - family: NotoNaskh
      fonts:
        - asset: assets/fonts/fonts_specific/notonaskh.ttf

    - family: Maddina
      fonts:
        - asset: assets/fonts/madina/MADDINA.ttf

flutter_gen:
  integrations:
    image: true
    flutter_svg: true
    rive: true
    lottie: true