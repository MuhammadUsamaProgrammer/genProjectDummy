name: wird_book
description: "Wird Book"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  flutter_svg: ^2.2.2
  lottie: ^3.3.2
  flutter_gen: ^5.12.0
  cached_network_image: ^3.4.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  video_player: ^2.10.0
  chewie: ^1.13.0
  fluttertoast: ^9.0.0
  url_launcher: ^6.3.2
  dio: ^5.9.0
  share_plus: ^12.0.1
  image_picker: ^1.2.0
  flutter_local_notifications: ^19.5.0
  retrofit: ^4.9.2
  path_provider: ^2.1.5
  file_picker: ^10.3.3
  image: ^4.5.4
  intl: ^0.20.2
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.4.0
  visibility_detector: ^0.4.0+2
  permission_handler: ^12.0.1
  cached_network_image_platform_interface: ^4.1.1
  flutter_localizations:
    sdk: flutter
  dotted_border: ^3.1.0
  intl_phone_field: ^3.2.0
  geolocator: ^13.0.2
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  riverpod_generator: ^3.0.3
  retrofit_generator: ^10.2.1
  riverpod_lint: ^3.0.3
  freezed: ^3.2.3
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/fonts/
    - assets/images/
    - .env

  fonts:
    - family: RustamQuran
      fonts:
        - asset: assets/fonts/rustam_quranR3HOQ.ttf

flutter_gen:
  integrations:
    image: true
    flutter_svg: true
    rive: true
    lottie: true